spring:
  application:
    name: InventoryApp

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

server:
  port: ${SERVER_PORT:8080}


management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# 로깅
logging:
  level:
    root: INFO
    com.example: DEBUG
