name: 3-Tier Deploy via SSM
on:
  push:
    branches: [ master ]
  workflow_dispatch:
 
env:
  AWS_REGION:  ap-northeast-2
  S3_BUCKET:   intg-lab-deploy-${{ secrets.AWS_ACCOUNT_ID }}
  ASG_NAME:    intg-lab-asg
  DEPLOY_DIR:  /var/www/html
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      # 1. checkout
      - uses: actions/checkout@v4
      # 2. AWS 연결을 위한 인증 처리 정보
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
 
      # 3. 배포 버전 자동 주입(github 코드) + S3 업로드
      - name: Package & S3 upload
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          # 1) 배포 버전 정보 처리... (frontend 버전처리)
          sed -i "s|배포 버전: [^<]*|배포 버전: ${SHORT_SHA}|g" frontend/index.html || true
          # 2) zip 압축 파일 작업
          zip -r deploy-${GITHUB_SHA}.zip . --exclude '*.git*' --exclude '.github/*'
          # 3) aws 서비스 s3서비스에 파일 업로드. 버전 업로드 및 latest 버전으로 업로드 진행... 
          aws s3 cp deploy-${GITHUB_SHA}.zip s3://${S3_BUCKET}/releases/deploy-${GITHUB_SHA}.zip
          aws s3 cp deploy-${GITHUB_SHA}.zip s3://${S3_BUCKET}/releases/deploy-latest.zip
 
      # 4. ASG InService 인스턴스 조회(Auto Scale Group에 있는 인스턴 조회)
      - name: Get instances
        # id는 step 단계를 구분하는 구분값!
        id: inst
        run: |
          IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${ASG_NAME} \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text | tr '\t' ' ')
          echo "ids=${IDS}" >> $GITHUB_OUTPUT
 
      # 5. SSM Rolling 배포
      # ${{ steps.inst.outputs.ids }} => 작업 단계 중 id가 "inst"인 단계의 출력 값을 의미함. 
      - name: SSM deploy
        run: |
          for IID in ${{ steps.inst.outputs.ids }}; do
            # 각 인스턴스가 실행할 명령 리스트 작업 commands 리스트에 들어가는 명령어를 실행. 
            CMD=$(aws ssm send-command --instance-ids $IID \
              --document-name AWS-RunShellScript \
              --parameters 'commands=[
                # 1) S3에 저장된 배포 압축 파일을 다운로드(/tmp/d.zip 이라는 경로로 다운로드)
                aws s3 cp s3://'${S3_BUCKET}'/releases/deploy-latest.zip /tmp/d.zip,
                # 2) unzip을 통해서 압축을 해제. ${DEPLOY_DIR} 에 압축을 해제
                #  /var/www/html -> ${DEPLOY_DIR}
                unzip -o /tmp/d.zip -d '${DEPLOY_DIR}',
                # 3) /var/www/html은 nginx의 index.html이 존재하는 곳!!! 
                # /var/www/html/index.hml 을 복사. frontend/index.html으로 대체
                cp '${DEPLOY_DIR}/frontend/index.html' '${DEPLOY_DIR}',
     # 4) /opt/app/ 폴더 배포 폴더에 압축 해제한 내용 복사 해서 작업
                cp -rf '${DEPLOY_DIR}/*' /opt/app/,
                # 5) nginx를 재시작 처리 합니다. 
                nginx -t && systemctl reload nginx,
                # 6) /opt/app/gradlew 라는 빌드를 위한 스크립트에 실행 권한 설정
                chmod +x /opt/app/gradlew,
                # 7) /opt/app 폴더 이동
                cd /opt/app/,
                # 8) 빌드 작업 실행
                gradlew bootJar,
                # 9) 환경 설정 정보 및 빌드 처리된 jar를 파일을 실행
                export $(cat .env | xargs) && java -jar build/libs/inventory-app.jar &,
                sleep 30,
                # 10) 서버 구동 확인 처리!
                curl -sf http://localhost:8080/actuator/health]' \
              --timeout-seconds 300 \
              --query Command.CommandId --output text)
            for i in $(seq 1 30); do
              sleep 10
              ST=$(aws ssm get-command-invocation \
                --command-id $CMD --instance-id $IID \
                --query Status --output text 2>/dev/null || echo Pending)
              [ "$ST" = Success ] && break
              [ "$ST" = Failed ] && exit 1
            done
            echo "✅ $IID 완료"
          done
